<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIMade — Show the world what you built with AI</title>
<meta name="description" content="AIMade 是全球 AI 創作者的分享社群 — 分享你用 AI 做的網頁、App、圖片、影片、Prompt 和工具。The global community for sharing AI-made work.">
<meta name="google-site-verification" content="8KO4JWX03ZPKBwNMcuhK5aeWr94zE7cMwT2iV0EyG8A">
<meta property="og:title" content="AIMade — Show the world what you built with AI">
<meta property="og:description" content="Upload your AI-made web apps, images, videos, prompts and tools. Free to share — show the world what you built with AI.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://aimade.world/">
<meta property="og:image" content="https://aimade.world/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://aimade.world/og.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='14' fill='%23201d1a'/><text x='50' y='74' font-size='62' text-anchor='middle' fill='%23faf8f4' font-family='Georgia' font-weight='bold'>A</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg:#faf8f3; --bg2:#f3efe7; --card:#fffdf9; --card2:#f6f2ea;
  --border:#e7e0d3; --border2:#d9d1c1;
  --text:#22201c; --muted:#6e675c; --faint:#9c937f;
  --accent:#c74a1e; --accent-d:#a83d16; --ink:#22201c; --gold:#8a6a1f;
  --serif:'Fraunces','Noto Serif TC',Georgia,serif;
  --sans:'Inter','Noto Sans TC',-apple-system,sans-serif;
  --r:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.7;font-size:15px;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit}
.container{max-width:1120px;margin:0 auto;padding:0 28px}
.eyebrow{display:inline-block;font-size:11.5px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
.section{padding:84px 0}
.section-head{max-width:620px;margin:0 auto 48px;text-align:center}
.section-head h2{font-family:var(--serif);font-size:34px;font-weight:600;letter-spacing:-.01em;margin-bottom:10px;line-height:1.25}
.section-head p{color:var(--muted);font-size:15.5px}

/* ===== NAV ===== */
nav{position:sticky;top:0;z-index:100;background:rgba(250,248,243,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.nav-inner{display:flex;align-items:center;gap:30px;height:64px;max-width:1120px;margin:0 auto;padding:0 28px}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;white-space:nowrap}
.logo-mark{width:28px;height:28px;border-radius:7px;background:var(--ink);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:15px;color:var(--bg)}
.logo-word{font-family:var(--serif);font-size:20px;font-weight:700;letter-spacing:-.01em}
.logo-word span{color:var(--accent);font-style:italic}
.nav-links{display:flex;gap:2px;flex:1}
.nav-links button{background:none;border:none;color:var(--muted);font-size:14px;font-weight:500;padding:8px 14px;border-radius:8px;cursor:pointer;transition:.15s}
.nav-links button:hover{color:var(--text)}
.nav-links button.active{color:var(--text);background:var(--card2)}
.nav-right{display:flex;gap:10px;align-items:center}
.lang-btn{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:5px 12px;border-radius:7px;cursor:pointer;font-size:12.5px;font-weight:600;transition:.15s}
.lang-btn:hover{color:var(--text);border-color:var(--ink)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 22px;border-radius:9px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:.16s;letter-spacing:.01em}
.btn-primary{background:var(--ink);color:var(--bg)}
.btn-primary:hover{background:var(--accent)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text)}
.btn-ghost:hover{border-color:var(--ink)}
.btn-lg{padding:14px 30px;font-size:15px;border-radius:10px}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--border);border-radius:18px;padding:5px 14px;font-size:13px;color:var(--muted)}
.user-chip b{color:var(--text);font-weight:600}
.user-chip .adm{color:var(--gold);font-weight:600}

/* ===== HERO ===== */
.hero{text-align:center;padding:96px 28px 64px;border-bottom:1px solid var(--border)}
.hero-pill{display:inline-block;border:1px solid var(--border2);padding:5px 16px;border-radius:18px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:30px}
.hero h1{font-family:var(--serif);font-size:56px;line-height:1.14;font-weight:600;letter-spacing:-.015em;max-width:820px;margin:0 auto 22px}
.hero h1 .grad{font-style:italic;color:var(--accent)}
.hero p{color:var(--muted);font-size:17px;max-width:580px;margin:0 auto 36px}
.hero-btns{display:flex;gap:13px;justify-content:center;flex-wrap:wrap;margin-bottom:60px}
.stats{display:flex;justify-content:center;flex-wrap:wrap;border:1px solid var(--border);border-radius:12px;background:var(--card);max-width:680px;margin:0 auto}
.stat{flex:1;min-width:150px;padding:22px 18px;text-align:center}
.stat + .stat{border-left:1px solid var(--border)}
.stat b{font-family:var(--serif);font-size:27px;font-weight:600;display:block}
.stat span{color:var(--faint);font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.trusted{margin-top:54px;color:var(--faint);font-size:11.5px;letter-spacing:.16em;text-transform:uppercase}
.trusted-logos{display:flex;gap:34px;justify-content:center;flex-wrap:wrap;margin-top:14px;color:var(--faint);font-family:var(--serif);font-style:italic;font-size:16px}

/* ===== TOOLBAR / FILTERS ===== */
.toolbar{display:flex;gap:13px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:240px;position:relative}
.search input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px 15px 11px 40px;color:var(--text);font-size:14px;font-family:inherit;transition:.15s}
.search input:focus{outline:none;border-color:var(--ink)}
.search::before{content:"⌕";position:absolute;left:14px;top:50%;transform:translateY(-52%);color:var(--faint);font-size:18px}
.sort select{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px 13px;color:var(--muted);font-size:13.5px;font-family:inherit;cursor:pointer}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px}
.chip{padding:7px 16px;border-radius:18px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-weight:500;transition:.15s}
.chip:hover{color:var(--text);border-color:var(--border2)}
.chip.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}

/* ===== CARDS ===== */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:22px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:box-shadow .2s,transform .2s,border-color .2s;cursor:pointer}
.card:hover{transform:translateY(-3px);border-color:var(--border2);box-shadow:0 10px 30px rgba(60,50,30,.09)}
.thumb{height:160px;display:flex;align-items:center;justify-content:center;position:relative;background-size:cover;background-position:center;border-bottom:1px solid var(--border)}
.thumb-letter{font-family:var(--serif);font-size:52px;font-weight:600;color:rgba(34,32,28,.32);font-style:italic}
.badge{position:absolute;top:12px;left:12px;background:var(--card);border:1px solid var(--border2);padding:3px 10px;border-radius:6px;font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);z-index:2}
.badge.hot{color:var(--accent);border-color:var(--accent)}
.card-body{padding:17px 18px}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text);flex-shrink:0;border:1px solid var(--border2)}
.card-top h3{font-size:15.5px;font-weight:600;letter-spacing:-.01em;line-height:1.3}
.card-top .by{color:var(--faint);font-size:12.5px}
.card-meta{display:flex;gap:14px;color:var(--faint);font-size:12.5px;margin-bottom:12px}
.card-desc{color:var(--muted);font-size:13px;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-foot{display:flex;justify-content:space-between;align-items:center;padding-top:13px;border-top:1px solid var(--border)}
.price{font-family:var(--serif);font-weight:600;font-size:15px}
.price.free{color:var(--gold);font-size:12.5px;font-weight:600;font-family:var(--sans);letter-spacing:.05em;text-transform:uppercase}
.card-actions{display:flex;gap:7px}
.icon-btn{background:transparent;border:1px solid var(--border);border-radius:7px;padding:5px 11px;cursor:pointer;font-size:12.5px;color:var(--muted);font-weight:500;transition:.15s}
.icon-btn:hover{border-color:var(--ink);color:var(--text)}
.icon-btn.liked{border-color:var(--accent);color:var(--accent)}

/* ===== HOW ===== */
.steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:20px}
.step{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:28px;transition:.2s}
.step:hover{border-color:var(--border2)}
.step .num{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--accent);margin-bottom:14px;display:block}
.step h3{margin-bottom:7px;font-size:16px;font-weight:600}
.step p{color:var(--muted);font-size:13.5px}

/* ===== FEE SECTION ===== */
.fee-wrap{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:stretch}
.fee-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:32px}
.fee-card h3{font-family:var(--serif);font-size:19px;font-weight:600;margin-bottom:6px}
.fee-card .sub{color:var(--muted);font-size:13.5px;margin-bottom:22px}
.fee-bar{display:flex;height:44px;border-radius:8px;overflow:hidden;font-size:12.5px;font-weight:600;margin-bottom:13px;border:1px solid var(--border2)}
.fee-bar .you{background:var(--ink);display:flex;align-items:center;justify-content:center;color:var(--bg)}
.fee-bar .us{background:var(--card2);display:flex;align-items:center;justify-content:center;color:var(--muted)}
.fee-legend{color:var(--faint);font-size:12.5px}
.fee-split{display:flex;flex-direction:column;gap:10px;margin-top:18px}
.fee-row{display:flex;justify-content:space-between;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 17px;font-size:13.5px}
.fee-row b{color:var(--accent);font-family:var(--serif);font-size:15px}
.fee-row .lbl{color:var(--muted)}
.breakdown{list-style:none;margin-top:18px}
.breakdown li{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--border);color:var(--muted);font-size:13px}
.breakdown li span:last-child{color:var(--text);font-weight:600}

/* ===== TESTIMONIALS ===== */
.quotes{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.quote{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:28px;position:relative}
.quote::before{content:"\201C";font-family:var(--serif);font-size:52px;line-height:1;color:var(--accent);display:block;margin-bottom:8px;font-style:italic}
.quote p{font-size:14px;color:var(--text);margin-bottom:18px}
.quote-who{display:flex;align-items:center;gap:11px}
.quote-who .avatar{width:36px;height:36px;font-size:12px}
.quote-who b{font-size:13.5px;display:block;font-weight:600}
.quote-who span{color:var(--faint);font-size:12px}

/* ===== PRICING ===== */
.plans{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:22px}
.plan{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:32px;position:relative;display:flex;flex-direction:column}
.plan.hot{border:2px solid var(--ink)}
.plan .tag{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:3px 15px;border-radius:12px;font-size:11px;font-weight:600;letter-spacing:.05em;white-space:nowrap}
.plan h3{font-family:var(--serif);font-size:18px;font-weight:600;margin-bottom:3px}
.plan .plan-sub{color:var(--faint);font-size:12.5px;margin-bottom:16px}
.plan .amount{font-family:var(--serif);font-size:38px;font-weight:600;letter-spacing:-.02em}
.plan .amount small{font-size:13px;color:var(--faint);font-weight:400;font-family:var(--sans)}
.plan .keep{display:inline-block;background:var(--card2);color:var(--gold);font-size:12px;font-weight:600;padding:4px 11px;border-radius:6px;margin:11px 0 5px;border:1px solid var(--border)}
.plan ul{list-style:none;margin:16px 0 24px;flex:1}
.plan ul li{padding:7px 0;color:var(--muted);font-size:13.5px;display:flex;gap:9px}
.plan ul li::before{content:"—";color:var(--accent)}
.plan .btn{width:100%}

/* ===== FAQ ===== */
.faq{max-width:700px;margin:0 auto}
.faq-item{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;background:var(--card);overflow:hidden}
.faq-q{width:100%;background:none;border:none;color:var(--text);font-size:14.5px;font-weight:600;padding:18px 21px;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:16px}
.faq-q::after{content:"+";font-family:var(--serif);font-size:19px;color:var(--faint);transition:.2s;flex-shrink:0}
.faq-item.open .faq-q::after{transform:rotate(45deg);color:var(--accent)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .3s ease;color:var(--muted);font-size:13.5px}
.faq-item.open .faq-a{max-height:220px}
.faq-a div{padding:0 21px 19px}

/* ===== CTA ===== */
.cta{text-align:center;background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:64px 30px}
.cta h2{font-family:var(--serif);font-size:31px;font-weight:600;letter-spacing:-.01em;margin-bottom:10px}
.cta p{color:var(--muted);margin-bottom:30px;font-size:15px}

/* ===== UPLOAD ===== */
.upload-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:26px;align-items:start}
.upload-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:36px}
.upload-box h2{font-family:var(--serif);margin-bottom:5px;font-size:24px;font-weight:600;letter-spacing:-.01em}
.upload-box .sub{color:var(--muted);font-size:13.5px;margin-bottom:26px}
.field{margin-bottom:18px}
.field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:7px;color:var(--muted)}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-size:14px;font-family:inherit;transition:.15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--ink)}
.field input[type=file]{padding:8px}
.pricing-row{display:flex;gap:13px}
.pricing-row .field{flex:1}
.side-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:26px;margin-bottom:20px}
.side-card h4{font-family:var(--serif);font-size:15px;font-weight:600;margin-bottom:12px}
.side-card p,.side-card li{color:var(--muted);font-size:13px}
.side-card ul{list-style:none}
.side-card ul li{padding:5px 0;display:flex;gap:9px}
.side-card ul li::before{content:"—";color:var(--accent)}

/* ===== MODAL ===== */
.modal-bg{position:fixed;inset:0;background:rgba(34,32,28,.45);backdrop-filter:blur(4px);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.on{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:36px;max-width:420px;width:100%;position:relative;box-shadow:0 24px 60px rgba(40,32,20,.18)}
.modal h3{font-family:var(--serif);font-size:21px;font-weight:600;margin-bottom:7px}
.modal p{color:var(--muted);font-size:13.5px;margin-bottom:20px}
.modal .close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--faint);font-size:22px;cursor:pointer;line-height:1}
.modal input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:14px;font-family:inherit;margin-bottom:13px}
.modal input:focus{outline:none;border-color:var(--ink)}
.modal .status{font-size:12.5px;color:var(--gold);min-height:20px;margin-top:10px}
.lg-tick{width:56px;height:56px;border-radius:50%;background:var(--card2);border:1px solid var(--border2);color:var(--accent);font-size:28px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:4px auto 16px}
.modal.wide{max-width:560px;padding:0;overflow:hidden}
.wm-cover{height:220px;display:flex;align-items:center;justify-content:center;background-size:cover;background-position:center;border-bottom:1px solid var(--border)}
.wm-cover .thumb-letter{font-size:76px}
.wm-body{padding:26px 30px 30px}
.wm-body h3{font-size:23px}
.wm-meta{color:var(--faint);font-size:12.5px;margin-bottom:15px}
.wm-desc{color:var(--muted);font-size:14px;margin-bottom:20px;white-space:pre-wrap;max-height:180px;overflow:auto}
.wm-actions{display:flex;gap:9px;flex-wrap:wrap}

/* ===== FOOTER ===== */
footer{border-top:1px solid var(--border);margin-top:56px;background:var(--bg2)}
.foot-grid{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:34px;padding:56px 0 40px}
.foot-grid p{color:var(--faint);font-size:13px;margin-top:12px;max-width:280px}
.foot-col h5{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:14px}
.foot-col a{display:block;color:var(--muted);font-size:13.5px;padding:4px 0;cursor:pointer}
.foot-col a:hover{color:var(--text)}
.foot-bottom{border-top:1px solid var(--border);padding:20px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;color:var(--faint);font-size:12.5px}
.pay-logos{display:flex;gap:13px;font-weight:600;font-size:11.5px;color:var(--faint);letter-spacing:.03em}

.page{display:none}
.page.show{display:block}
.reveal{opacity:0;transform:translateY(14px);transition:opacity .5s,transform .5s}
.reveal.in{opacity:1;transform:none}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--ink);color:var(--bg);padding:12px 24px;border-radius:10px;font-weight:500;font-size:13.5px;opacity:0;transition:.3s;pointer-events:none;z-index:400;box-shadow:0 10px 30px rgba(40,32,20,.25)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:900px){.fee-wrap,.upload-grid,.foot-grid{grid-template-columns:1fr}.hero h1{font-size:38px}.nav-links{display:none}}

/* ===== MOBILE MENU ===== */
.menu-btn{display:none;background:transparent;border:1px solid var(--border2);color:var(--text);border-radius:7px;padding:6px 12px;cursor:pointer;font-size:16px;line-height:1}
@media(max-width:900px){
  .menu-btn{display:inline-flex}
  .nav-links{position:absolute;top:64px;left:0;right:0;background:var(--bg);flex-direction:column;padding:12px;border-bottom:1px solid var(--border);z-index:99}
  .nav-links.open{display:flex}
  .nav-links button{text-align:left;padding:13px 16px;font-size:15px}
  .user-chip{display:none}
  #authArea{display:inline-flex;align-items:center;gap:6px;flex-wrap:nowrap}
  #authArea .btn{white-space:nowrap}
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="logo" onclick="go('home')">
      <div class="logo-mark">A</div>
      <div class="logo-word">AI<span>Made</span></div>
    </div>

    myLikes = new Set();
    if(currentUser){
      (data||[]).forEach(w=>{ if((w.likes||[]).some(l=>l.user_id===currentUser.id)) myLikes.add(w.id); });
    }
  }catch(e){ console.error(e); realWorks = []; }
  renderExplore(); renderFeatured(); renderStats();
  const wid = new URLSearchParams(location.search).get("w");
  if(wid && !window._deepOpened){ window._deepOpened = true; openWork(wid); }
}
function allWorks(){ return [...realWorks, ...DEMO]; }
function renderStats(){
  const creators = new Set(realWorks.map(w=>w.owner)).size;
  const likes = realWorks.reduce((s,w)=>s+w.likeCount,0) + DEMO.reduce((s,w)=>s+w.likeCount,0);
  document.getElementById("statWorks").textContent = (realWorks.length + DEMO.length).toLocaleString();
  document.getElementById("statCreators").textContent = creators.toLocaleString();
  document.getElementById("statLikes").textContent = likes.toLocaleString();
}

/* ============ Cards ============ */
function esc(s){ return (s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
// 只允許 http/https 連結,擋 javascript: / data: 等注入
function safeUrl(u){
  if(!u) return "";
  try{ const p = new URL(u, location.origin); return (p.protocol==="http:"||p.protocol==="https:") ? p.href : ""; }
  catch(e){ return ""; }
}
// 只允許來自本專案 Supabase storage 的封面圖
function safeCover(u){
  const s = safeUrl(u);
  return s.startsWith(SB_URL + "/storage/") ? s : "";
}
// 安全開啟外部連結(不用 inline onclick 字串)
function openExt(u){ const s = safeUrl(u); if(s) window.open(s,"_blank","noopener,noreferrer"); }
function titleInitial(w){
  const s = (w.demo ? w.title[lang] : (w.title||"")) .trim();
  return s ? s.charAt(0).toUpperCase() : "A";
}
function cardHTML(w,i){
  const isDemo = !!w.demo;
  const title = isDemo ? w.title[lang] : esc(w.title);
  const name = esc(w.owner_name||"Anonymous");
  const init = name.split(/[\s._@-]/).filter(Boolean).map(x=>x[0]).join("").slice(0,2).toUpperCase() || "AI";
  const cover = isDemo ? "" : safeCover(w.cover_url);
  const thumbStyle = cover ? `background-image:url('${encodeURI(cover).replace(/'/g,"%27")}')` : `background:${TINTS[i%TINTS.length]}`;
  const letter = cover ? "" : `<span class="thumb-letter">${esc(titleInitial(w))}</span>`;
  const badge = isDemo ? `<span class="badge">${t("demo")}</span>` : (w.likeCount>=5 ? `<span class="badge hot">${t("trending")}</span>` : `<span class="badge">${t("cat_"+w.category)}</span>`);
  const likeCls = (!isDemo && myLikes.has(w.id)) ? "icon-btn liked" : "icon-btn";
  const likeBtn = isDemo
    ? `<button class="icon-btn" onclick="event.stopPropagation();toast(t('demo'))">♥ ${w.likeCount}</button>`
    : `<button class="${likeCls}" onclick="event.stopPropagation();toggleLike('${esc(w.id)}')">♥ ${w.likeCount}</button>`;
  const link = isDemo ? "" : safeUrl(w.link);
  const viewBtn = link ? `<button class="icon-btn" onclick="event.stopPropagation();openExt(this.dataset.u)" data-u="${esc(link)}">${t("view")}</button>` : "";
  const delBtn = (!isDemo && currentUser && (currentUser.id===w.owner || isAdmin)) ? `<button class="icon-btn" onclick="event.stopPropagation();delWork('${w.id}')">${t("del")}</button>` : "";
  const desc = (!isDemo && w.description) ? `<div class="card-desc">${esc(w.description)}</div>` : "";
  return `<div class="card" onclick="openWork('${w.id}')">
    <div class="thumb" style="${thumbStyle}">${letter}${badge}</div>
    <div class="card-body">
      <div class="card-top">
        <div class="avatar" style="background:${AV_TINTS[i%4]}">${init}</div>
        <div><h3>${title}</h3><div class="by">${t("by")} ${name}</div></div>
      </div>
      ${desc}
      <div class="card-foot">
        <span class="by" style="color:var(--faint);font-size:12px">${t("cat_"+w.category)}</span>
        <div class="card-actions">${likeBtn}${viewBtn}${delBtn}</div>
      </div>
    </div>
  </div>`;
}

let activeCat = "all";
function renderChips(){
  const list = currentUser ? ["all","mine",...CATS] : ["all",...CATS];
  document.getElementById("chips").innerHTML = list.map(c=>
    `<button class="chip ${c===activeCat?'active':''}" onclick="filterCat('${c}')">${t("cat_"+c)}</button>`).join("");
}
function filterCat(c){ activeCat=c; renderChips(); renderExplore(); }
function renderExplore(){
  const q = (document.getElementById("searchBox").value||"").toLowerCase();
  const sort = document.getElementById("sortSel").value;
  let list = allWorks().filter(w => activeCat==="all" || (activeCat==="mine" ? (!w.demo && currentUser && w.owner===currentUser.id) : w.category===activeCat));
  if(q) list = list.filter(w => {
    const title = w.demo ? (w.title.zh+" "+w.title.en) : (w.title||"");
    return title.toLowerCase().includes(q) || (w.owner_name||"").toLowerCase().includes(q);
  });
  if(sort==="pop") list.sort((a,b)=>b.likeCount-a.likeCount);
  document.getElementById("exploreGrid").innerHTML = list.length
    ? list.map(cardHTML).join("")
    : `<p style="color:var(--muted);grid-column:1/-1;text-align:center;padding:40px">${t("no_works")}</p>`;
}
function renderFeatured(){
  const top = allWorks().slice().sort((a,b)=>b.likeCount-a.likeCount).slice(0,3);
  document.getElementById("featuredGrid").innerHTML = top.map(cardHTML).join("");
}

/* ============ Work detail / share / report ============ */
function openWork(id){
  const w = allWorks().find(x=>String(x.id)===String(id));
  if(!w) return;
  const isDemo = !!w.demo;
  const title = isDemo ? w.title[lang] : esc(w.title);
  const name = esc(w.owner_name||"Anonymous");
  const cover = isDemo ? "" : safeCover(w.cover_url);
  const coverStyle = cover ? `background-image:url('${encodeURI(cover).replace(/'/g,"%27")}')` : `background:${TINTS[Math.max(0,CATS.indexOf(w.category))%TINTS.length]}`;
  const letter = cover ? "" : `<span class="thumb-letter">${esc(titleInitial(w))}</span>`;
  const link = isDemo ? "" : safeUrl(w.link);
  const linkBtn = link ? `<button class="btn btn-primary" onclick="openExt(this.dataset.u)" data-u="${esc(link)}">${t("open_work")}</button>` : "";
  const shareBtn = !isDemo ? `<button class="btn btn-ghost" onclick="shareWork('${w.id}')">${t("share")}</button>` : "";
  const reportBtn = !isDemo ? `<button class="btn btn-ghost" onclick="reportWork('${w.id}')">${t("report")}</button>` : "";
  const delBtn = (!isDemo && currentUser && (currentUser.id===w.owner || isAdmin)) ? `<button class="btn btn-ghost" onclick="closeWork();delWork('${w.id}')">${t("del")}</button>` : "";
  document.getElementById("workModalBody").innerHTML = `
    <div class="wm-cover" style="${coverStyle}">${letter}</div>
    <div class="wm-body">
      <h3>${title}</h3>
      <div class="wm-meta">${t("by")} ${name} · ${t("cat_"+w.category)}${isDemo?` · ${t("demo")}`:""}</div>
      ${(!isDemo && w.description)?`<div class="wm-desc">${esc(w.description)}</div>`:""}
      <div class="wm-actions">${linkBtn}${shareBtn}${reportBtn}${delBtn}</div>
    </div>`;
  document.getElementById("workModal").classList.add("on");
}
function closeWork(){ document.getElementById("workModal").classList.remove("on"); }
async function shareWork(id){
  const url = location.origin + location.pathname + "?w=" + id;
  try{ await navigator.clipboard.writeText(url); toast(t("copy_ok")); }
  catch(e){ prompt("Link:", url); }
}
async function reportWork(id){
  if(!currentUser){ toast(t("up_need_login")); openLogin(); return; }
  const reason = prompt(t("report_why"));
  if(reason===null) return;
  const { error } = await sb.from("reports").insert({ work_id:id, reporter:currentUser.id, reason: reason.trim()||null });
  toast(error ? t("up_fail") : t("report_ok"));
}
function toggleMenu(){ document.getElementById("navLinks").classList.toggle("open"); }

/* ============ Auth ============ */
function renderAuth(){
  const area = document.getElementById("authArea");
  if(currentUser){
    const name = esc((currentUser.email||"").split("@")[0]);
    const shield = isAdmin ? ` <span class="adm">· ${t("admin")}</span>` : "";
    area.innerHTML = `<span class="user-chip"><b>${name}</b>${shield}</span> <button class="btn btn-ghost" onclick="signOut()">${t("signout")}</button>`;
  }else{
    area.innerHTML = `<button class="btn btn-ghost" onclick="openLogin()">${t("signin")}</button> <button class="btn btn-primary" onclick="go('upload')">${t("cta_upload")}</button>`;
  }
}
function openLogin(){
  document.getElementById("lgForm").style.display = "block";
  document.getElementById("lgDone").style.display = "none";
  document.getElementById("lgStatus").textContent = "";
  document.getElementById("loginModal").classList.add("on");
}
function closeLogin(){ document.getElementById("loginModal").classList.remove("on"); }
async function sendMagicLink(){
  const email = document.getElementById("lgEmail").value.trim();
  const st = document.getElementById("lgStatus");
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ st.textContent = t("lg_bad"); return; }
  const btn = document.getElementById("lgBtn");
  btn.disabled = true; btn.textContent = t("lg_sending");
  const { error } = await sb.auth.signInWithOtp({ email, options:{ emailRedirectTo: location.origin + "/" } });
  btn.disabled = false; btn.textContent = t("lg_send");
  if(error){ st.textContent = t("lg_fail"); return; }
  document.getElementById("lgForm").style.display = "none";
  document.getElementById("lgDone").style.display = "block";
  document.getElementById("lgDoneMsg").textContent = t("lg_done_p").replace("{email}", email);
}
async function signOut(){ await sb.auth.signOut(); }
async function checkAdmin(){
  isAdmin = false;
  if(currentUser){
    try{
      const { data } = await sb.from("admins").select("user_id").eq("user_id", currentUser.id).maybeSingle();
      isAdmin = !!data;
    }catch(e){ console.error(e); }
  }
}
sb.auth.onAuthStateChange((_e, session)=>{
  currentUser = session ? session.user : null;
  if(!currentUser && activeCat==="mine") activeCat = "all";
  checkAdmin().then(()=>{ renderAuth(); renderChips(); loadWorks(); });
});

/* ============ Upload ============ */
async function submitUpload(){
  const title = document.getElementById("upName").value.trim();
  if(!title){ toast(t("up_need_name")); return; }
  if(!currentUser){ toast(t("up_need_login")); openLogin(); return; }
  const coverFile = document.getElementById("upCover").files[0];
  if(coverFile && coverFile.size > 5*1024*1024){ toast(t("up_img_big")); return; }
  let linkVal = document.getElementById("upLink").value.trim();
  if(linkVal && !/^https?:\/\//i.test(linkVal)) linkVal = "https://" + linkVal;
  const btn = document.getElementById("publishBtn");
  btn.disabled = true; btn.textContent = t("up_publishing");
  try{
    let cover_url = null;
    const file = document.getElementById("upCover").files[0];
    if(file){
      const path = `${currentUser.id}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,"_")}`;
      const { error: upErr } = await sb.storage.from("covers").upload(path, file);
      if(upErr) throw upErr;
      cover_url = sb.storage.from("covers").getPublicUrl(path).data.publicUrl;
    }
    const disp = document.getElementById("upDisp").value.trim();
    if(disp) localStorage.setItem("aimade_dispname", disp);
    const { error } = await sb.from("works").insert({
      owner: currentUser.id,
      owner_name: disp || t("anon"),
      title,
      category: document.getElementById("upCat").value,
      description: document.getElementById("upDesc").value.trim() || null,
      link: safeUrl(linkVal) || null,
      cover_url,
      price: 0,
      accept_tips: true
    });
    if(error) throw error;
    toast(t("up_done"));
    document.getElementById("upName").value = "";
    document.getElementById("upDesc").value = "";
    document.getElementById("upLink").value = "";
    document.getElementById("upCover").value = "";
    await loadWorks();
    go("explore");
  }catch(e){ console.error(e); toast(t("up_fail")); }
  btn.disabled = false; btn.textContent = t("up_submit");
}
async function delWork(id){
  if(!confirm(t("del_confirm"))) return;
  const { error } = await sb.from("works").delete().eq("id", id);
  if(!error){ toast(t("del_done")); loadWorks(); }
}

/* ============ Likes ============ */
async function toggleLike(workId){
  if(!currentUser){ toast(t("need_login_like")); openLogin(); return; }
  if(myLikes.has(workId)){
    await sb.from("likes").delete().eq("work_id", workId).eq("user_id", currentUser.id);
  }else{
    await sb.from("likes").insert({ work_id: workId, user_id: currentUser.id });
  }
  loadWorks();
}

/* ============ Nav / lang / misc ============ */
function go(p){
  document.getElementById("navLinks").classList.remove("open");
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("show"));
  document.getElementById("page-"+p).classList.add("show");
  document.querySelectorAll(".nav-links button").forEach(x=>x.classList.remove("active"));
  const nb = document.getElementById("nav-"+p); if(nb) nb.classList.add("active");
  window.scrollTo({top:0});
  revealAll();
}
function applyLang(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-ph]").forEach(el=>{ el.placeholder = t(el.dataset.i18nPh); });
  document.getElementById("langBtn").textContent = lang==="zh" ? "EN" : "中文";
  document.documentElement.lang = lang==="zh" ? "zh-Hant" : "en";
  renderChips(); renderExplore(); renderFeatured(); renderAuth();
}
function toggleLang(){ lang = lang==="zh" ? "en" : "zh"; applyLang(); }
function faq(btn){
  const item = btn.parentElement;
  const was = item.classList.contains("open");
  document.querySelectorAll(".faq-item").forEach(x=>x.classList.remove("open"));
  if(!was) item.classList.add("open");
}
let toastTimer;
function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("on");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove("on"), 2600);
}
const io = new IntersectionObserver(es=>es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target);} }),{threshold:.08});
function revealAll(){ document.querySelectorAll(".page.show .reveal:not(.in)").forEach(el=>io.observe(el)); }

document.querySelectorAll(".modal-bg").forEach(m=>m.addEventListener("click",e=>{ if(e.target===m) m.classList.remove("on"); }));
const savedDisp = localStorage.getItem("aimade_dispname");
if(savedDisp) document.getElementById("upDisp").value = savedDisp;
applyLang();
revealAll();
loadWorks();
try{ sb.from("page_views").insert({ path: location.pathname, ref: (document.referrer||"").slice(0,200) || null }).then(()=>{}); }catch(e){}
</script>
