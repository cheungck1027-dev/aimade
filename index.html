<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIMade — Show the world what you built with AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c10; --bg2:#0f1218; --card:#141824; --card2:#1a1f2e;
  --border:#232a3b; --border2:#2e3650;
  --text:#f2f4fa; --muted:#98a2b8; --faint:#5c667e;
  --accent:#6d7cff; --accent-d:#5563e8; --teal:#2dd4a7; --gold:#f5b94e;
  --grad:linear-gradient(120deg,#6d7cff,#2dd4a7);
  --shadow:0 12px 40px rgba(0,0,0,.45);
  --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter','Noto Sans TC',-apple-system,sans-serif;line-height:1.65;font-size:15px;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit}
.container{max-width:1140px;margin:0 auto;padding:0 28px}
.eyebrow{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);margin-bottom:12px}
.section{padding:88px 0}
.section-head{text-align:center;max-width:640px;margin:0 auto 52px}
.section-head h2{font-size:34px;font-weight:800;letter-spacing:-.02em;margin-bottom:12px}
.section-head p{color:var(--muted);font-size:16px}

/* ===== NAV ===== */
nav{position:sticky;top:0;z-index:100;background:rgba(10,12,16,.82);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-inner{display:flex;align-items:center;gap:32px;height:68px;max-width:1140px;margin:0 auto;padding:0 28px}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;white-space:nowrap}
.logo-mark{width:30px;height:30px;border-radius:9px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#0a0c10}
.logo-word{font-size:19px;font-weight:800;letter-spacing:-.02em}
.logo-word span{color:var(--accent)}
.nav-links{display:flex;gap:2px;flex:1}
.nav-links button{background:none;border:none;color:var(--muted);font-size:14px;font-weight:500;padding:8px 15px;border-radius:9px;cursor:pointer;transition:.15s}
.nav-links button:hover{color:var(--text)}
.nav-links button.active{color:var(--text);background:var(--card2)}
.nav-right{display:flex;gap:10px;align-items:center}
.lang-btn{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:6px 13px;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:600;transition:.15s}
.lang-btn:hover{color:var(--text);border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 22px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:.18s;letter-spacing:.01em}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 18px rgba(109,124,255,.35)}
.btn-primary:hover{background:var(--accent-d);transform:translateY(-1px)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text)}
.btn-ghost:hover{border-color:var(--accent);background:rgba(109,124,255,.06)}
.btn-lg{padding:14px 30px;font-size:15px;border-radius:12px}

/* ===== HERO ===== */
.hero{position:relative;text-align:center;padding:104px 28px 72px;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;background:
  radial-gradient(ellipse 55% 45% at 50% -5%,rgba(109,124,255,.16),transparent),
  radial-gradient(ellipse 30% 30% at 82% 20%,rgba(45,212,167,.07),transparent);pointer-events:none}
.hero-pill{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border2);padding:6px 16px;border-radius:20px;font-size:13px;color:var(--muted);margin-bottom:28px}
.hero-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal)}
.hero h1{font-size:56px;line-height:1.12;font-weight:800;letter-spacing:-.03em;max-width:840px;margin:0 auto 22px}
.hero h1 .grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero p{color:var(--muted);font-size:18px;max-width:600px;margin:0 auto 38px}
.hero-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:66px}
.stats{display:flex;gap:0;justify-content:center;flex-wrap:wrap;border:1px solid var(--border);border-radius:16px;background:rgba(20,24,36,.6);backdrop-filter:blur(8px);max-width:720px;margin:0 auto;position:relative}
.stat{flex:1;min-width:160px;padding:26px 20px;text-align:center}
.stat + .stat{border-left:1px solid var(--border)}
.stat b{font-size:28px;font-weight:800;display:block;letter-spacing:-.02em}
.stat span{color:var(--faint);font-size:12.5px;font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.trusted{margin-top:60px;color:var(--faint);font-size:12px;letter-spacing:.12em;text-transform:uppercase}
.trusted-logos{display:flex;gap:38px;justify-content:center;flex-wrap:wrap;margin-top:18px;color:var(--muted);font-weight:700;font-size:15px;opacity:.55}

/* ===== TOOLBAR / FILTERS ===== */
.toolbar{display:flex;gap:14px;margin-bottom:26px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:240px;position:relative}
.search input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 16px 12px 42px;color:var(--text);font-size:14px;font-family:inherit;transition:.15s}
.search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(109,124,255,.15)}
.search::before{content:"⌕";position:absolute;left:15px;top:50%;transform:translateY(-52%);color:var(--faint);font-size:19px}
.sort select{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 14px;color:var(--muted);font-size:13.5px;font-family:inherit;cursor:pointer}
.chips{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:34px}
.chip{padding:8px 18px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:13.5px;font-weight:500;transition:.15s}
.chip:hover{color:var(--text);border-color:var(--border2)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 3px 14px rgba(109,124,255,.3)}

/* ===== CARDS ===== */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:transform .22s,border-color .22s,box-shadow .22s;cursor:pointer}
.card:hover{transform:translateY(-5px);border-color:var(--border2);box-shadow:var(--shadow)}
.thumb{height:168px;display:flex;align-items:center;justify-content:center;font-size:54px;position:relative}
.thumb::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(10,12,16,.5))}
.badge{position:absolute;top:12px;left:12px;background:rgba(8,10,14,.62);backdrop-filter:blur(6px);padding:4px 11px;border-radius:8px;font-size:11px;font-weight:600;z-index:2;letter-spacing:.02em}
.badge.featured{background:var(--gold);color:#141414}
.card-body{padding:18px}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;color:#0a0c10;flex-shrink:0}
.card-top h3{font-size:15.5px;font-weight:700;letter-spacing:-.01em;line-height:1.3}
.card-top .by{color:var(--faint);font-size:12.5px}
.card-meta{display:flex;gap:14px;color:var(--faint);font-size:12.5px;margin-bottom:14px}
.card-meta .star{color:var(--gold)}
.card-foot{display:flex;justify-content:space-between;align-items:center;padding-top:14px;border-top:1px solid var(--border)}
.price{font-weight:700;font-size:15px}
.price.free{color:var(--teal);font-size:13px;font-weight:600}
.card-actions{display:flex;gap:8px}
.icon-btn{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12.5px;color:var(--muted);font-weight:500;transition:.15s}
.icon-btn:hover{border-color:var(--accent);color:var(--text)}

/* ===== HOW ===== */
.steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:22px}
.step{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:30px;transition:.2s}
.step:hover{border-color:var(--border2);transform:translateY(-3px)}
.step .ic{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,rgba(109,124,255,.18),rgba(45,212,167,.14));border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:21px;margin-bottom:18px}
.step h3{margin-bottom:8px;font-size:16.5px;font-weight:700}
.step p{color:var(--muted);font-size:14px}

/* ===== FEE SECTION ===== */
.fee-wrap{display:grid;grid-template-columns:1fr 1fr;gap:26px;align-items:stretch}
.fee-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:34px}
.fee-card h3{font-size:18px;font-weight:700;margin-bottom:6px}
.fee-card .sub{color:var(--muted);font-size:14px;margin-bottom:24px}
.fee-bar{display:flex;height:46px;border-radius:11px;overflow:hidden;font-size:13px;font-weight:700;margin-bottom:14px}
.fee-bar .you{background:var(--grad);display:flex;align-items:center;justify-content:center;color:#0a0c10}
.fee-bar .us{background:var(--card2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;color:var(--muted)}
.fee-legend{color:var(--faint);font-size:13px}
.fee-split{display:flex;flex-direction:column;gap:12px;margin-top:20px}
.fee-row{display:flex;justify-content:space-between;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px 18px;font-size:14px}
.fee-row b{color:var(--teal);font-size:16px}
.fee-row .lbl{color:var(--muted)}
.breakdown{list-style:none;margin-top:20px}
.breakdown li{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dashed var(--border);color:var(--muted);font-size:13.5px}
.breakdown li span:last-child{color:var(--text);font-weight:600}

/* ===== TESTIMONIALS ===== */
.quotes{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:22px}
.quote{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:28px}
.quote .stars{color:var(--gold);letter-spacing:2px;margin-bottom:14px;font-size:13px}
.quote p{font-size:14.5px;color:var(--text);margin-bottom:20px}
.quote-who{display:flex;align-items:center;gap:12px}
.quote-who .avatar{width:38px;height:38px;font-size:13px}
.quote-who b{font-size:14px;display:block}
.quote-who span{color:var(--faint);font-size:12.5px}

/* ===== PRICING ===== */
.plans{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px}
.plan{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:34px;position:relative;display:flex;flex-direction:column}
.plan.hot{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 18px 50px rgba(109,124,255,.18)}
.plan .tag{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:var(--accent);padding:4px 16px;border-radius:14px;font-size:11.5px;font-weight:700;letter-spacing:.04em;white-space:nowrap}
.plan h3{font-size:17px;font-weight:700;margin-bottom:4px}
.plan .plan-sub{color:var(--faint);font-size:13px;margin-bottom:18px}
.plan .amount{font-size:40px;font-weight:800;letter-spacing:-.03em}
.plan .amount small{font-size:14px;color:var(--faint);font-weight:500}
.plan .keep{display:inline-block;background:rgba(45,212,167,.12);color:var(--teal);font-size:12.5px;font-weight:700;padding:4px 12px;border-radius:8px;margin:12px 0 6px}
.plan ul{list-style:none;margin:18px 0 26px;flex:1}
.plan ul li{padding:8px 0;color:var(--muted);font-size:14px;display:flex;gap:10px}
.plan ul li::before{content:"✓";color:var(--teal);font-weight:800}
.plan .btn{width:100%}

/* ===== FAQ ===== */
.faq{max-width:720px;margin:0 auto}
.faq-item{border:1px solid var(--border);border-radius:12px;margin-bottom:12px;background:var(--card);overflow:hidden}
.faq-q{width:100%;background:none;border:none;color:var(--text);font-size:15px;font-weight:600;padding:19px 22px;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:16px}
.faq-q::after{content:"+";font-size:20px;color:var(--faint);transition:.2s;flex-shrink:0}
.faq-item.open .faq-q::after{transform:rotate(45deg);color:var(--accent)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .3s ease;color:var(--muted);font-size:14px}
.faq-item.open .faq-a{max-height:220px}
.faq-a div{padding:0 22px 20px}

/* ===== CTA ===== */
.cta{text-align:center;background:linear-gradient(135deg,rgba(109,124,255,.12),rgba(45,212,167,.08));border:1px solid var(--border2);border-radius:22px;padding:70px 30px;position:relative;overflow:hidden}
.cta h2{font-size:32px;font-weight:800;letter-spacing:-.02em;margin-bottom:12px}
.cta p{color:var(--muted);margin-bottom:32px;font-size:16px}

/* ===== UPLOAD ===== */
.upload-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:28px;align-items:start}
.upload-box{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:38px}
.upload-box h2{margin-bottom:6px;font-size:24px;font-weight:800;letter-spacing:-.02em}
.upload-box .sub{color:var(--muted);font-size:14px;margin-bottom:28px}
.field{margin-bottom:20px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:8px;color:var(--muted)}
.field input,.field select,.field textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 15px;color:var(--text);font-size:14px;font-family:inherit;transition:.15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(109,124,255,.14)}
.dropzone{border:1.5px dashed var(--border2);border-radius:13px;padding:42px;text-align:center;color:var(--muted);cursor:pointer;margin-bottom:24px;transition:.15s;font-size:14px}
.dropzone:hover{border-color:var(--accent);background:rgba(109,124,255,.04)}
.dropzone .big{font-size:30px;display:block;margin-bottom:8px}
.pricing-row{display:flex;gap:14px}
.pricing-row .field{flex:1}
.side-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;margin-bottom:22px}
.side-card h4{font-size:15px;font-weight:700;margin-bottom:14px}
.side-card p,.side-card li{color:var(--muted);font-size:13.5px}
.side-card ul{list-style:none}
.side-card ul li{padding:6px 0;display:flex;gap:9px}
.side-card ul li::before{content:"·";color:var(--accent);font-weight:800}

/* ===== FOOTER ===== */
footer{border-top:1px solid var(--border);margin-top:60px;background:var(--bg2)}
.foot-grid{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:36px;padding:60px 0 44px}
.foot-grid p{color:var(--faint);font-size:13.5px;margin-top:14px;max-width:280px}
.foot-col h5{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:16px}
.foot-col a{display:block;color:var(--muted);font-size:14px;padding:5px 0;cursor:pointer}
.foot-col a:hover{color:var(--text)}
.foot-bottom{border-top:1px solid var(--border);padding:22px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;color:var(--faint);font-size:13px}
.pay-logos{display:flex;gap:14px;font-weight:700;font-size:12.5px;color:var(--faint);letter-spacing:.02em}

.page{display:none}
.page.show{display:block}
.reveal{opacity:0;transform:translateY(18px);transition:opacity .55s,transform .55s}
.reveal.in{opacity:1;transform:none}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--card2);border:1px solid var(--accent);color:var(--text);padding:13px 26px;border-radius:12px;font-weight:600;font-size:14px;opacity:0;transition:.3s;pointer-events:none;z-index:200;box-shadow:var(--shadow)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:900px){.fee-wrap,.upload-grid,.foot-grid{grid-template-columns:1fr}.hero h1{font-size:38px}.nav-links{display:none}}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="logo" onclick="go('home')">
      <div class="logo-mark">A</div>
      <div class="logo-word">AI<span>Made</span></div>
    </div>
    <div class="nav-links">
      <button id="nav-home" class="active" onclick="go('home')" data-i18n="nav_home"></button>
      <button id="nav-explore" onclick="go('explore')" data-i18n="nav_explore"></button>
      <button id="nav-upload" onclick="go('upload')" data-i18n="nav_upload"></button>
      <button id="nav-pricing" onclick="go('pricing')" data-i18n="nav_pricing"></button>
    </div>
    <div class="nav-right">
      <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN</button>
      <button class="btn btn-ghost" data-i18n="signin" onclick="toast(t('demo_msg'))"></button>
      <button class="btn btn-primary" data-i18n="join" onclick="go('upload')"></button>
    </div>
  </div>
</nav>

<!-- ============ HOME ============ -->
<div class="page show" id="page-home">
  <div class="hero">
    <div class="hero-pill"><span class="dot"></span><span data-i18n="pill"></span></div>
    <h1><span data-i18n="hero_1"></span> <span class="grad" data-i18n="hero_2"></span></h1>
    <p data-i18n="hero_sub"></p>
    <div class="hero-btns">
      <button class="btn btn-primary btn-lg" data-i18n="cta_upload" onclick="go('upload')"></button>
      <button class="btn btn-ghost btn-lg" data-i18n="cta_explore" onclick="go('explore')"></button>
    </div>
    <div class="stats">
      <div class="stat"><b>12,480</b><span data-i18n="stat_projects"></span></div>
      <div class="stat"><b>3,842</b><span data-i18n="stat_creators"></span></div>
      <div class="stat"><b>2.4M</b><span data-i18n="stat_views"></span></div>
    </div>
    <div class="trusted" data-i18n="trusted"></div>
    <div class="trusted-logos"><span>Claude</span><span>Midjourney</span><span>GPT</span><span>Runway</span><span>Suno</span><span>Cursor</span></div>
  </div>

  <div class="container section reveal">
    <div class="section-head">
      <div class="eyebrow" data-i18n="featured_eye"></div>
      <h2 data-i18n="featured_title"></h2>
      <p data-i18n="featured_sub"></p>
    </div>
    <div class="grid" id="featuredGrid"></div>
    <div style="text-align:center;margin-top:40px">
      <button class="btn btn-ghost" onclick="go('explore')" data-i18n="see_all"></button>
    </div>
  </div>

  <div class="container section reveal">
    <div class="section-head">
      <div class="eyebrow" data-i18n="how_eye"></div>
      <h2 data-i18n="how_title"></h2>
    </div>
    <div class="steps">
      <div class="step"><div class="ic">📤</div><h3 data-i18n="how1_t"></h3><p data-i18n="how1_p"></p></div>
      <div class="step"><div class="ic">🏷️</div><h3 data-i18n="how2_t"></h3><p data-i18n="how2_p"></p></div>
      <div class="step"><div class="ic">🌍</div><h3 data-i18n="how3_t"></h3><p data-i18n="how3_p"></p></div>
      <div class="step"><div class="ic">💸</div><h3 data-i18n="how4_t"></h3><p data-i18n="how4_p"></p></div>
    </div>
  </div>

  <!-- TESTIMONIALS -->
  <div class="container section reveal">
    <div class="section-head">
      <div class="eyebrow" data-i18n="q_eye"></div>
      <h2 data-i18n="q_title"></h2>
    </div>
    <div class="quotes">
      <div class="quote"><div class="stars">★★★★★</div><p data-i18n="q1"></p>
        <div class="quote-who"><div class="avatar" style="background:linear-gradient(135deg,#6d7cff,#2dd4a7)">KJ</div><div><b>Kenji T.</b><span data-i18n="q1_who"></span></div></div></div>
      <div class="quote"><div class="stars">★★★★★</div><p data-i18n="q2"></p>

let lang = "zh";
const t = k => I[lang][k] || k;

/* ============ Sample data ============ */
const CATS = ["cat_app","cat_image","cat_video","cat_prompt","cat_tool"];
const WORKS = [
 {n:{zh:"一鍵履歷生成器",en:"One-click Resume Builder"},by:"Kenji T.",cat:"cat_app",e:"📄",g:"linear-gradient(135deg,#4a3aff,#7c5cff)",price:5,feat:1,rate:4.9,sales:412,d:9},
 {n:{zh:"賽博朋克城市插畫集",en:"Cyberpunk City Art Pack"},by:"Luna W.",cat:"cat_image",e:"🌆",g:"linear-gradient(135deg,#ff5c8a,#f5b94e)",price:12,feat:1,rate:4.8,sales:356,d:14},
 {n:{zh:"30 秒產品宣傳片模板",en:"30s Product Promo Template"},by:"Maria S.",cat:"cat_video",e:"🎬",g:"linear-gradient(135deg,#2dd4a7,#38b6ff)",price:25,feat:1,rate:5.0,sales:298,d:6},

 {n:{zh:"水墨風動物頭像生成",en:"Ink-style Animal Avatars"},by:"MoShui",cat:"cat_image",e:"🐼",g:"linear-gradient(135deg,#2b3a55,#2dd4a7)",price:6,feat:0,rate:4.8,sales:189,d:4},

];
const AV_COLORS=["linear-gradient(135deg,#6d7cff,#2dd4a7)","linear-gradient(135deg,#f5b94e,#ff6b8b)","linear-gradient(135deg,#2dd4a7,#38b6ff)","linear-gradient(135deg,#ff5c8a,#7c5cff)"];

function cardHTML(w,i){
  const price = w.price ? `US$${w.price}` : `<span class="price free">${t("free")}</span>`;
  const init = w.by.split(/[\s.]/).filter(Boolean).map(x=>x[0]).join("").slice(0,2).toUpperCase();
  return `<div class="card" onclick="toast(t('demo_msg'))">
    <div class="thumb" style="background:${w.g}">${w.e}
      ${w.feat?`<span class="badge featured">🔥 ${t("trending")}</span>`:`<span class="badge">${t(w.cat)}</span>`}
    </div>
    <div class="card-body">
      <div class="card-top">
        <div class="avatar" style="background:${AV_COLORS[i%4]}">${init}</div>
        <div><h3>${w.n[lang]}</h3><div class="by">${t("by")} ${w.by}</div></div>
      </div>
      <div class="card-meta">
        <span><span class="star">★</span> ${w.rate.toFixed(1)}</span>
        <span>${w.sales.toLocaleString()} ${t("sales")}</span>
      </div>
      <div class="card-foot">
        <span class="price">${price}</span>
        <div class="card-actions">
          <button class="icon-btn" onclick="event.stopPropagation();toast(t('demo_msg'))">💜 ${t("tip")}</button>
          <button class="icon-btn" onclick="event.stopPropagation();toast(t('demo_msg'))">${t("view")}</button>
        </div>
      </div>
    </div>
  </div>`;
}

let activeCat = "cat_all";
function renderChips(){
  document.getElementById("chips").innerHTML = ["cat_all",...CATS].map(c=>
    `<button class="chip ${c===activeCat?'active':''}" onclick="filterCat('${c}')">${t(c)}</button>`).join("");
}
function filterCat(c){ activeCat=c; renderChips(); renderExplore(); }
function renderExplore(){
  const q = (document.getElementById("searchBox").value||"").toLowerCase();
  const sort = document.getElementById("sortSel").value;
  let list = activeCat==="cat_all" ? [...WORKS] : WORKS.filter(w=>w.cat===activeCat);
  if(q) list = list.filter(w => w.n.zh.toLowerCase().includes(q) || w.n.en.toLowerCase().includes(q) || w.by.toLowerCase().includes(q));
  if(sort==="pop") list.sort((a,b)=>b.sales-a.sales);
  else if(sort==="new") list.sort((a,b)=>a.d-b.d);
  else if(sort==="price") list.sort((a,b)=>a.price-b.price);
  document.getElementById("exploreGrid").innerHTML = list.map(cardHTML).join("");
}
function renderFeatured(){
  document.getElementById("featuredGrid").innerHTML = WORKS.filter(w=>w.feat).map(cardHTML).join("");
}

/* ============ Nav / lang ============ */
function go(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("show"));
  document.getElementById("page-"+p).classList.add("show");
  document.querySelectorAll(".nav-links button").forEach(x=>x.classList.remove("active"));
  const nb = document.getElementById("nav-"+p); if(nb) nb.classList.add("active");
  window.scrollTo({top:0});
  revealAll();
}
function applyLang(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-ph]").forEach(el=>{ el.placeholder = t(el.dataset.i18nPh); });
  document.getElementById("langBtn").textContent = lang==="zh" ? "EN" : "中文";
  document.documentElement.lang = lang==="zh" ? "zh-Hant" : "en";
  renderChips(); renderExplore(); renderFeatured();
}
function toggleLang(){ lang = lang==="zh" ? "en" : "zh"; applyLang(); }

function submitUpload(){
  const name = document.getElementById("upName").value.trim();
  toast(name ? t("up_done") : t("up_need_name"));
}
function faq(btn){
  const item = btn.parentElement;
  const was = item.classList.contains("open");
  document.querySelectorAll(".faq-item").forEach(x=>x.classList.remove("open"));
  if(!was) item.classList.add("open");
}
let toastTimer;
function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("on");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove("on"), 2200);
}

/* scroll reveal */
const io = new IntersectionObserver(es=>es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target);} }),{threshold:.08});
function revealAll(){ document.querySelectorAll(".page.show .reveal:not(.in)").forEach(el=>io.observe(el)); }

applyLang();
revealAll();
</script>
